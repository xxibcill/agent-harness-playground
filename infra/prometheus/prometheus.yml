global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: agent-harness-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8000

  - job_name: agent-harness-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - worker:9101

  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8889
